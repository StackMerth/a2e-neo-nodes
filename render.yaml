# Render Blueprint for the A2E Engine API.
# Deploy by going to https://dashboard.render.com/blueprints, clicking
# "New Blueprint", and pointing at this repo. Render will read this file
# and provision the Postgres database, Redis instance, and API web service
# in one go.
#
# After provisioning, set the secrets that have `sync: false` below
# (API_KEY and any external market keys you intend to enable) via the
# Render dashboard, then trigger a redeploy.

databases:
  - name: a2e-postgres
    plan: basic-256mb # ~$6/mo. Bump to basic-1gb when DB grows past ~150MB.
    databaseName: a2e
    user: a2e
    postgresMajorVersion: "16"

services:
  # Key Value (Redis-compatible) instance used for BullMQ job queues
  # and route-rate caching. Render renamed the old `type: redis` to
  # `type: keyvalue`; the wire protocol is still Redis.
  - type: keyvalue
    name: a2e-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: [] # empty = internal-only, no public IPs accepted

  # The Fastify API plus all 11 BullMQ workers. They run in one Node
  # process, so a single web service is sufficient. Scale the plan up
  # before scaling instance count - duplicating workers across instances
  # would cause double execution of cron jobs.
  - type: web
    name: a2e-api
    runtime: node
    plan: standard
    region: oregon # change if your buyers/operators are mostly EU/APAC
    healthCheckPath: /health
    autoDeploy: true
    # Render's build container has /usr/bin read-only, so corepack
    # cannot symlink pnpm there. We install pnpm via npm instead, which
    # writes to a user-space prefix that is on PATH for both build and
    # runtime. Re-installing in startCommand is cheap (~10s) and ensures
    # pnpm is available in the runtime container too.
    #
    # --prod=false forces pnpm to install devDependencies despite
    # Render's default NODE_ENV=production. We need them at build time
    # for prisma (CLI for `prisma generate`) and typescript (`tsc`),
    # and at runtime for prisma (CLI for `prisma migrate deploy`).
    #
    # The `@a2e/api...` filter (note the trailing ellipsis) tells pnpm
    # to also include all workspace packages that @a2e/api depends on
    # (shared, core, database) and build them in correct topological
    # order. Without this, tsc on @a2e/api fails with TS2307 because
    # the dist directories of the upstream packages do not exist yet.
    buildCommand: |
      npm install -g pnpm@8.15.0 &&
      pnpm install --frozen-lockfile --prod=false &&
      pnpm --filter "@a2e/api..." build
    # M1.6 status: a clean baseline migration was committed at
    # packages/database/prisma/migrations/0_init. The active deploy
    # path still uses `prisma db push` because the live database's
    # _prisma_migrations tracking table still references the old
    # incomplete migrations and has not yet been reset to the new
    # baseline. Switching to `migrate deploy` requires the one-time
    # operator action documented at docs/MIGRATION_SWITCHOVER.md.
    #
    # AFTER the switchover steps are run on the live DB, change the
    # body of this command from
    #   prisma db push --skip-generate --accept-data-loss
    # to
    #   prisma migrate deploy
    # and the next deploy will be a no-op (0_init already applied),
    # with all future schema changes applied incrementally and
    # tracked in _prisma_migrations.
    startCommand: |
      npm install -g pnpm@8.15.0 &&
      cd packages/database && pnpm exec prisma db push --skip-generate --accept-data-loss && cd ../.. &&
      pnpm --filter=@a2e/api start
    envVars:
      # Pin to Node 20 LTS. The package.json says >=20, and Render
      # otherwise picks the newest available (currently 26.x) which
      # has v8 API changes that break some native bindings (e.g. ssh2).
      # Node 20 is what the code was developed against.
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info

      # Auto-wired by Render from the database + redis blocks above.
      - key: DATABASE_URL
        fromDatabase:
          name: a2e-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: a2e-redis
          type: keyvalue
          property: connectionString

      # Auto-generated 64-char secret for portal JWT signing.
      - key: JWT_SECRET
        generateValue: true

      # Admin authentication. CHANGE THESE BEFORE GOING LIVE.
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

      # Agent-to-API auth key. Generate a long random string.
      - key: API_KEY
        sync: false

      # E6 / M3.8c: Docker Image Registry token signing.
      # PEM-encoded RSA private key (4096 bit) used to sign tokens the
      # a2e-registry service will accept. Generate locally via:
      #   openssl genrsa -out registry-private.pem 4096
      #   openssl rsa -in registry-private.pem -pubout -out registry-public.pem
      #   openssl req -x509 -new -key registry-private.pem -days 3650 \
      #     -subj "/CN=a2e-registry-issuer" -out registry-cert.pem
      # Paste the private.pem contents (replace literal newlines with \n
      # since Render env vars are single-line) into Render's secret editor.
      # The matching cert.pem goes on the registry service as a Secret File.
      - key: REGISTRY_JWT_PRIVATE_KEY
        sync: false
      # Optional overrides (defaulted in code if unset):
      - key: REGISTRY_SERVICE_NAME
        value: a2e-registry
      - key: REGISTRY_ISSUER
        value: a2e-registry-issuer

      # Heartbeat timing (matches .env.example defaults).
      - key: HEARTBEAT_TIMEOUT_MS
        value: 90000
      - key: HEARTBEAT_CHECK_INTERVAL_MS
        value: 10000
      - key: RATE_CACHE_TTL_MS
        value: 60000
      - key: RATE_FETCH_INTERVAL_MS
        value: 60000

      # External market adapters - leave disabled until Phase 1
      # completion item (live credentials integration) lands.
      - key: AKASH_ENABLED
        value: false
      - key: AKASH_API_ENDPOINT
        value: https://api.cloudmos.io
      - key: AKASH_MNEMONIC
        sync: false
      - key: IONET_ENABLED
        value: false
      - key: IONET_API_ENDPOINT
        sync: false
      - key: VASTAI_ENABLED
        value: false
      - key: VASTAI_API_KEY
        sync: false

      # Solana settlement. Start in dev mode (simulated tx hashes); flip
      # to live after the payer wallet is funded and the Phase 1
      # completion item ships.
      - key: PAYMENT_MODE
        value: dev
      - key: SOLANA_RPC_URL
        value: https://api.mainnet-beta.solana.com

  # E6 / M3.8c: Docker Image Registry.
  # Runs the upstream distribution/distribution v2.8.3 binary, wrapped
  # in our thin Dockerfile (apps/registry/Dockerfile) that ships a
  # default config. Production behavior is driven by REGISTRY_* env
  # vars below and the cert.pem mounted as a Secret File.
  #
  # Auth flow: docker push -> 401 with Bearer realm -> Docker CLI
  # follows realm to a2e-api /v1/registry/token -> API issues RS256
  # JWT -> CLI sends JWT to this service -> this service verifies
  # with cert.pem -> push proceeds.
  #
  # Storage: separate S3 bucket from checkpoints (registry blobs can
  # grow large; isolation is cleaner). Set REGISTRY_STORAGE_S3_* env
  # vars to point at a dedicated bucket.
  - type: web
    name: a2e-registry
    runtime: docker
    plan: standard
    region: oregon
    autoDeploy: true
    rootDir: apps/registry
    dockerfilePath: ./Dockerfile
    # No healthCheckPath: when token auth is enabled, /v2/ returns 401
    # (Docker V2 protocol-correct) and Render's health check rejects it
    # despite docs claiming 401 is OK. Falling back to TCP-only check by
    # omitting the path is reliable and sufficient: the registry process
    # crashes on bad config rather than starting in a broken state, so
    # "port open" already implies "healthy enough to serve auth".
    envVars:
      # Bind to Render's default web port. Override of config.yml's :5000.
      - key: REGISTRY_HTTP_ADDR
        value: ":10000"
      # Token auth pointing at our API.
      - key: REGISTRY_AUTH_TOKEN_REALM
        value: https://a2e-api.onrender.com/v1/registry/token
      - key: REGISTRY_AUTH_TOKEN_SERVICE
        value: a2e-registry
      - key: REGISTRY_AUTH_TOKEN_ISSUER
        value: a2e-registry-issuer
      # Render Secret Files mount under /etc/secrets/ regardless of the
      # filename you choose, so the cert.pem upload at filename "cert.pem"
      # lives at /etc/secrets/cert.pem. The original /etc/docker/registry
      # path is a config.yml default that no longer applies on Render.
      - key: REGISTRY_AUTH_TOKEN_ROOTCERTBUNDLE
        value: /etc/secrets/cert.pem

      # Webhook notifications -> our API on every push event.
      # M3.9a will implement /v1/registry/webhook to consume these.
      - key: REGISTRY_NOTIFICATIONS_ENDPOINTS_0_NAME
        value: tokenos-api
      - key: REGISTRY_NOTIFICATIONS_ENDPOINTS_0_URL
        value: https://a2e-api.onrender.com/v1/registry/webhook
      - key: REGISTRY_NOTIFICATIONS_ENDPOINTS_0_TIMEOUT
        value: 5s
      - key: REGISTRY_NOTIFICATIONS_ENDPOINTS_0_THRESHOLD
        value: 3
      - key: REGISTRY_NOTIFICATIONS_ENDPOINTS_0_BACKOFF
        value: 10s
      # Shared secret between registry + API webhook receiver so the
      # API can verify webhook calls are real. Set on BOTH services.
      - key: REGISTRY_WEBHOOK_SECRET
        sync: false

      # S3 storage backend. Configure ALL of these via the Render UI
      # before the first deploy succeeds — the registry refuses to
      # start with an unreachable storage backend.
      - key: REGISTRY_STORAGE_S3_BUCKET
        sync: false
      - key: REGISTRY_STORAGE_S3_REGION
        sync: false
      - key: REGISTRY_STORAGE_S3_ACCESSKEY
        sync: false
      - key: REGISTRY_STORAGE_S3_SECRETKEY
        sync: false
      - key: REGISTRY_STORAGE_S3_ROOTDIRECTORY
        value: /registry

      # HMAC secret for chunked uploads. Auto-generated; any random
      # value works as long as it's consistent across replicas.
      - key: REGISTRY_HTTP_SECRET
        generateValue: true

      - key: REGISTRY_LOG_LEVEL
        value: info
